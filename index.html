<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allergy Test Result Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        .allergen-category {
            @apply bg-white p-4 rounded-lg shadow-sm border border-gray-100;
            margin-bottom: 0.75rem; /* Reduce vertical spacing between categories */
        }
        .category-title {
            @apply font-bold text-blue-800 flex justify-between items-center border-b pb-1 text-sm uppercase tracking-wider mb-2;
        }
        .group-btn {
            @apply text-[10px] bg-blue-50 text-blue-600 px-2 py-0.5 rounded border border-blue-200 hover:bg-blue-100 transition-colors normal-case font-medium;
        }
        .checkbox-item {
            @apply flex items-center space-x-2 py-1 cursor-pointer hover:bg-gray-50 rounded px-1 transition-colors w-fit;
            margin-bottom: 0.25em; /* ~4px extra spacing between rows */
        }
        .checkbox-item input[type="checkbox"] {
            width: 1.5em;
            height: 1.5em;
        }
        .checkbox-item span.text-gray-700 {
            font-size: 1.125rem; /* 18px, increased by 2pt from 14px */
            line-height: 1.5em;
            display: inline-flex;
            align-items: center;
        }
        .output-box {
            @apply bg-gray-50 p-4 rounded-lg border border-gray-200 font-sans text-gray-800 relative;
        }
        .copy-btn {
            @apply bg-blue-600 text-white px-3 py-1 rounded text-xs hover:bg-blue-700 transition-colors flex items-center gap-1;
        }
        .btn-container {
            @apply absolute top-2 right-2 flex gap-4 bg-white p-1 rounded-md border border-gray-200 shadow-sm;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-900">Allergy Result Generator</h1>
            <p class="text-gray-600">Select positive allergens to generate patient reports</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Allergen Selection Area -->
            <div class="lg:col-span-2 space-y-3">
                <!-- Change to 2 columns max for items, categories stacked vertically -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="categories-container">
                    <!-- Dynamic categories will be injected here -->
                </div>

                <!-- Export Handouts PDF Button -->
                <div class="flex gap-4 mb-4">
                    <button onclick="exportPDFHandouts()" class="bg-purple-600 text-white px-6 py-2 rounded shadow hover:bg-purple-700 transition-colors">
                        Export Handouts (PDF)
                    </button>
                </div>

                <!-- Check All / Clear All Buttons -->
                <div class="flex gap-4 mb-4">
                    <button onclick="selectAll()" class="bg-blue-600 text-white px-6 py-2 rounded shadow hover:bg-blue-700 transition-colors">
                        Check All
                    </button>
                    <button onclick="resetSelections()" class="bg-gray-500 text-white px-6 py-2 rounded shadow hover:bg-gray-600 transition-colors">
                        Clear All
                    </button>
                </div>

                <!-- Show/Hide Edit Allergen List Section -->
                <button id="toggle-editor-btn" onclick="toggleEditorSection()" class="bg-blue-500 text-white px-4 py-2 rounded shadow hover:bg-blue-700 transition-colors mb-2">
                    Show Edit Allergen List
                </button>
                <div id="edit-allergen-section" class="p-4 bg-white rounded-lg border border-gray-200 shadow-sm" style="display:none;">
                    <h2 class="text-lg font-semibold mb-2 text-blue-800">Edit Allergen List</h2>
                    <div id="editor-container"></div>
                    <div class="flex gap-2 mt-4">
                        <button onclick="saveCustomAllergenList()" class="bg-green-600 text-white px-4 py-2 rounded shadow hover:bg-green-700 transition-colors">Save List</button>
                        <button onclick="resetToDefaultAllergenList()" class="bg-gray-500 text-white px-4 py-2 rounded shadow hover:bg-gray-600 transition-colors">Reset to Default</button>
                    </div>
                    <p class="text-xs text-gray-500 mt-2">Your custom allergen list will be saved in your browser and used for future visits.</p>
                </div>

            </div>

            <!-- Result Area -->
            <div class="space-y-6">
                <div class="sticky top-8">
                    <h2 class="text-xl font-semibold mb-4 text-gray-800">Generated Reports</h2>
                    
                    <!-- Sentence Result -->
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Sentence Result:</label>
                        <div class="output-box" id="sentence-container">
                            <div class="btn-container">
                                <button onclick="copyToClipboard('sentence-text')" class="copy-btn" id="copy-sentence-btn">
                                    Copy
                                </button>
                                <!-- RTF button removed -->
                            </div>
                            <div id="sentence-text" class="pr-24 min-h-[3rem]">No allergens selected.</div>
                        </div>
                    </div>

                    <!-- Formal Result -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Formal Result:</label>
                        <div class="output-box" id="formal-container">
                            <div class="btn-container">
                                <button onclick="copyToClipboard('formal-text')" class="copy-btn" id="copy-formal-btn">
                                    Copy (Rich Text)
                                </button>
                                <button onclick="copyFormalPlainText()" class="copy-btn !bg-gray-500 hover:!bg-gray-700" id="copy-formal-plain-btn">
                                    Copy (Plain Text)
                                </button>
                                <!-- RTF button removed -->
                            </div>
                            <div id="formal-text" class="pr-24 whitespace-pre-wrap min-h-[8rem]">No allergens selected.</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Cookie/localStorage helpers
        function setCookie(name, value, days = 365) {
            const expires = new Date(Date.now() + days * 864e5).toUTCString();
            document.cookie = name + '=' + encodeURIComponent(value) + '; expires=' + expires + '; path=/';
        }
        function getCookie(name) {
            return document.cookie.split('; ').reduce((r, v) => {
                const parts = v.split('=');
                return parts[0] === name ? decodeURIComponent(parts[1]) : r;
            }, '');
        }

        // Default allergen data
        const defaultAllergenData = [
            { category: "Molds", items: [
                { name: "Alternaria", pdf: "Mold.pdf" },
                { name: "Aspergillus", pdf: "Mold.pdf" },
                { name: "Cladosporium", pdf: "Mold.pdf" },
                { name: "Penicillium", pdf: "Mold.pdf" }
            ] },
            { category: "Tree Pollens", items: [
                { name: "Ash", cross: "Olive - found in Europe", pdf: "Pollen.pdf" },
                { name: "Birch/Oak", cross: "Alder, Hazelnut, Hornbeam, Beech, Chestnut", pdf: "Pollen.pdf" },
                { name: "Cedar", cross: "Juniper, Cypress, Arborvitae", pdf: "Pollen.pdf" },
                { name: "Hackberry", cross: "Elm", pdf: "Pollen.pdf" },
                { name: "Maple", cross: "Box Elder", pdf: "Pollen.pdf" },
                { name: "Sycamore", pdf: "Pollen.pdf" },
                { name: "Walnut", cross: "Pecan, Hickory", pdf: "Pollen.pdf" },
                { name: "Willow", cross: "Cottonwood, Poplar, Aspen", pdf: "Pollen.pdf" },
                { name: "Mulberry", pdf: "Pollen.pdf" }
            ] },
            { category: "Grass Pollens", items: [
                { name: "Bermuda", pdf: "Pollen.pdf" },
                { name: "Johnson", cross: "Corn, Bahia, sugarcane", pdf: "Pollen.pdf" },
                { name: "Timothy Grass", cross: "Orchard, Rye, Kentucky Blue, Fescue", pdf: "Pollen.pdf" }
            ] },
            { category: "Weed Pollens", items: [
                { name: "Cocklebur", pdf: "Pollen.pdf" },
                { name: "Yellow Dock", cross: "Sheep Sorrel", pdf: "Pollen.pdf" },
                { name: "Firebush/Kochia", cross: "Burning Bush", pdf: "Pollen.pdf" },
                { name: "Lamb's Quarter", pdf: "Pollen.pdf" },
                { name: "Mugwort", cross: "Sage, Wormwood", pdf: "Pollen.pdf" },
                { name: "Pigweed", pdf: "Pollen.pdf" },
                { name: "English Plantain", pdf: "Pollen.pdf" },
                { name: "Russian Thistle", pdf: "Pollen.pdf" },
                { name: "Ragweed", pdf: "Pollen.pdf" }
            ] },
            { category: "Year-round Allergens", items: [
                { name: "Cat", pdf: "Cat.pdf" },
                { name: "Dog", pdf: "Dog.pdf" },
                { name: "Mouse", pdf: "Mouse.pdf" },
                { name: "Rat", pdf: "Default.pdf" },
                { name: "Horse", pdf: "Default.pdf" },
                { name: "Cockroach", pdf: "Cockroach.pdf" },
                { name: "Dust Mite", pdf: "Dust Mite.pdf" }
            ] }
        ];

        // Load allergen data from cookie or fallback to default
        function loadAllergenData() {
            const cookie = getCookie('customAllergenList');
            if (cookie) {
                try {
                    return JSON.parse(cookie);
                } catch (e) {
                    return defaultAllergenData;
                }
            }
            return defaultAllergenData;
        }

        let allergenData = loadAllergenData();

        // Render allergen selection UI
        function renderAllergenSelection() {
            const container = document.getElementById('categories-container');
            container.innerHTML = '';
            allergenData.forEach((cat, index) => {
                const div = document.createElement('div');
                div.className = 'allergen-category';
                const catId = `cat-${index}`;
                let itemsHtml = `
                    <div class="category-title">
                        <span>${cat.category}</span>
                        <div class="flex gap-2">
                            <button type="button" onclick="toggleGroup('${cat.category}', true)" class="group-btn">Select All</button>
                            <button type="button" onclick="toggleGroup('${cat.category}', false)" class="group-btn !bg-gray-50 !text-gray-500 !border-gray-200 hover:!bg-gray-100">Clear</button>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 gap-x-4">`;
                cat.items.forEach(itemObj => {
                    const item = itemObj.name;
                    itemsHtml += `
                        <label class="checkbox-item">
                            <input type="checkbox" name="allergen" value="${item}" data-category="${cat.category}" onchange="updateResults()" class="rounded text-blue-600">
                            <span class="text-gray-700 text-sm whitespace-nowrap">${item}</span>
                        </label>
                    `;
                });
                itemsHtml += `</div>`;
                div.innerHTML = itemsHtml;
                container.appendChild(div);
            });
            updateResults();
        }

        // Render allergen list editor UI
        function renderAllergenEditor() {
            const editor = document.getElementById('editor-container');
            editor.innerHTML = '';
            const pdfOptions = ["Default.pdf", "Mold.pdf", "Pollen.pdf", "Cat.pdf", "Dog.pdf", "Mouse.pdf", "Cockroach.pdf", "Dust Mite.pdf"];
            allergenData.forEach((cat, catIdx) => {
                const catDiv = document.createElement('div');
                catDiv.className = 'mb-4 p-2 border rounded';
                catDiv.innerHTML = `
                    <div class="flex items-center gap-2 mb-2">
                        <input type="text" value="${cat.category}" class="border px-2 py-1 rounded w-48 font-bold text-blue-700" onchange="updateCategoryName(${catIdx}, this.value)">
                        <select onchange="updateCategoryPDF(${catIdx}, this.value)" class="border px-2 py-1 rounded w-44">
                            ${pdfOptions.map(opt => `<option value='${opt}'${cat.pdf === opt ? ' selected' : ''}>${opt.replace('.pdf','')}</option>`).join('')}
                        </select>
                        <button type="button" onclick="removeCategory(${catIdx})" class="group-btn !bg-red-100 !text-red-600 !border-red-200">Delete Category</button>
                    </div>
                    <div id="items-${catIdx}"></div>
                    <div class="mt-2 flex gap-2">
                        <button type="button" onclick="addItem(${catIdx})" class="group-btn">Add Item</button>
                    </div>
                `;
                editor.appendChild(catDiv);
                renderItemsEditor(catIdx);
            });
            // Add new category button
            const addCatBtn = document.createElement('button');
            addCatBtn.textContent = 'Add Category';
            addCatBtn.className = 'group-btn mt-2';
            addCatBtn.onclick = () => {
                allergenData.push({ category: 'New Category', items: [], pdf: 'Default.pdf' });
                renderAllergenEditor();
            };
            editor.appendChild(addCatBtn);
        }

        window.updateCategoryPDF = function(idx, val) {
            allergenData[idx].pdf = val;
            renderAllergenSelection();
            renderAllergenEditor();
        };

        function renderItemsEditor(catIdx) {
            const itemsDiv = document.getElementById(`items-${catIdx}`);
            itemsDiv.innerHTML = '';
            const pdfOptions = ["Default.pdf", "Mold.pdf", "Pollen.pdf", "Cat.pdf", "Dog.pdf", "Mouse.pdf", "Cockroach.pdf", "Dust Mite.pdf"];
            allergenData[catIdx].items.forEach((item, itemIdx) => {
                const itemRow = document.createElement('div');
                itemRow.className = 'flex items-center gap-2 mb-1';
                itemRow.innerHTML = `
                    <input type="text" value="${item.name}" class="border px-2 py-1 rounded w-40" onchange="updateItemName(${catIdx}, ${itemIdx}, this.value)">
                    <input type="text" value="${item.cross || ''}" placeholder="Cross-reactive info (optional)" class="border px-2 py-1 rounded w-56" onchange="updateItemCross(${catIdx}, ${itemIdx}, this.value)">
                    <select onchange="updateItemPDF(${catIdx}, ${itemIdx}, this.value)" class="border px-2 py-1 rounded w-44">
                        ${pdfOptions.map(opt => `<option value='${opt}'${item.pdf === opt ? ' selected' : ''}>${opt.replace('.pdf','')}</option>`).join('')}
                    </select>
                    <button type="button" onclick="removeItem(${catIdx}, ${itemIdx})" class="group-btn !bg-red-100 !text-red-600 !border-red-200">Delete</button>
                `;
                itemsDiv.appendChild(itemRow);
            });
        }

        window.updateItemPDF = function(catIdx, itemIdx, val) {
            allergenData[catIdx].items[itemIdx].pdf = val;
            renderAllergenSelection();
            renderAllergenEditor();
        };

        // Editor actions
        window.updateCategoryName = function(idx, val) {
            allergenData[idx].category = val;
            renderAllergenSelection();
            renderAllergenEditor();
        };
        window.removeCategory = function(idx) {
            allergenData.splice(idx, 1);
            renderAllergenSelection();
            renderAllergenEditor();
        };
        window.addItem = function(catIdx) {
            allergenData[catIdx].items.push({ name: 'New Allergen' });
            renderAllergenSelection();
            renderAllergenEditor();
        };
        window.removeItem = function(catIdx, itemIdx) {
            allergenData[catIdx].items.splice(itemIdx, 1);
            renderAllergenSelection();
            renderAllergenEditor();
        };
        window.updateItemName = function(catIdx, itemIdx, val) {
            allergenData[catIdx].items[itemIdx].name = val;
            renderAllergenSelection();
            renderAllergenEditor();
        };
        window.updateItemCross = function(catIdx, itemIdx, val) {
            allergenData[catIdx].items[itemIdx].cross = val;
            renderAllergenSelection();
            renderAllergenEditor();
        };

        // Save/load/reset custom allergen list
        window.saveCustomAllergenList = function() {
            setCookie('customAllergenList', JSON.stringify(allergenData));
            alert('Custom allergen list saved!');
        };
        window.resetToDefaultAllergenList = function() {
            allergenData = JSON.parse(JSON.stringify(defaultAllergenData));
            setCookie('customAllergenList', '');
            renderAllergenSelection();
            renderAllergenEditor();
        };

        // Initial render
        window.onload = function() {
            renderAllergenSelection();
            renderAllergenEditor();
        };
        // ...existing code...

        function updateResults() {
            const selected = Array.from(document.querySelectorAll('input[name="allergen"]:checked'));
            const sentenceEl = document.getElementById('sentence-text');
            const formalEl = document.getElementById('formal-text');

            if (selected.length === 0) {
                sentenceEl.innerText = "No allergens selected.";
                formalEl.innerHTML = "No allergens selected.";
                return;
            }

            const names = selected.map(cb => cb.value);
            
            // 1. Sentence Logic
            let sentence = "The patient is allergic to ";
            if (names.length === 1) {
                sentence += names[0] + ".";
            } else if (names.length === 2) {
                sentence += names[0] + " and " + names[1] + ".";
            } else {
                const last = names.pop();
                sentence += names.join(", ") + ", and " + last + ".";
                // restore names for next use
                names.push(last);
            }
            sentenceEl.innerText = sentence;

            // 2. Formal Logic
            const grouped = {};
            selected.forEach(cb => {
                const cat = cb.getAttribute('data-category');
                if (!grouped[cat]) grouped[cat] = [];
                grouped[cat].push(cb.value);
            });

            let formalText = "";
            if (selected.length > 0) {
                formalText += "Note: Allergens listed in parentheses represent cross-reactive species that may cause symptoms despite not being individually tested.\n\n";
            }
            allergenData.forEach(cat => {
                if (grouped[cat.category]) {
                    formalText += cat.category.toUpperCase() + "\n";
                    const itemStrings = grouped[cat.category].map(selectedName => {
                        const itemData = cat.items.find(i => i.name === selectedName);
                        if (itemData && itemData.cross) {
                            return `• ${selectedName} (${itemData.cross})`;
                        }
                        return `• ${selectedName}`;
                    });
                    formalText += itemStrings.join("\n") + "\n\n";
                }
            });
            formalEl.innerHTML = `<pre style="font-family:inherit;font-size:inherit;white-space:pre-wrap;">${formalText.trim()}</pre>`;
        }

        function resetSelections() {
            document.querySelectorAll('input[name="allergen"]').forEach(cb => cb.checked = false);
            updateResults();
        }

        function selectAll() {
            document.querySelectorAll('input[name="allergen"]').forEach(cb => cb.checked = true);
            updateResults();
        }

        function toggleGroup(category, state) {
            document.querySelectorAll(`input[data-category="${category}"]`).forEach(cb => cb.checked = state);
            updateResults();
        }

        async function copyToClipboard(elementId) {
            const el = document.getElementById(elementId);
            const type = elementId.split('-')[0];
            const btn = document.querySelector(`#copy-${type}-btn`);
            try {
                if (type === 'formal') {
                    // Get the HTML content of the formal result
                    let html = el.innerHTML;
                    // Use Clipboard API for HTML if available
                    if (navigator.clipboard && window.ClipboardItem) {
                        await navigator.clipboard.write([
                            new ClipboardItem({
                                'text/html': new Blob([html], { type: 'text/html' })
                            })
                        ]);
                    } else {
                        // Fallback to execCommand
                        const tempDiv = document.createElement('div');
                        tempDiv.contentEditable = true;
                        tempDiv.style.position = 'fixed';
                        tempDiv.style.left = '-9999px';
                        tempDiv.style.top = '0';
                        tempDiv.innerHTML = html;
                        document.body.appendChild(tempDiv);
                        const range = document.createRange();
                        range.selectNodeContents(tempDiv);
                        const selection = window.getSelection();
                        selection.removeAllRanges();
                        selection.addRange(range);
                        document.execCommand('copy');
                        selection.removeAllRanges();
                        document.body.removeChild(tempDiv);
                    }
                } else {
                    // Standard text copy for sentence result
                    await navigator.clipboard.writeText(el.innerText);
                }
                const originalText = btn.innerHTML;
                btn.innerHTML = "Copied!";
                btn.classList.replace('bg-blue-600', 'bg-green-600');
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.replace('bg-green-600', 'bg-blue-600');
                }, 2000);
            } catch (err) {
                console.error('Failed to copy rich text: ', err);
                // Fallback to basic text
                try {
                    await navigator.clipboard.writeText(el.innerText);
                    btn.innerHTML = "Copied Text Only";
                    setTimeout(() => { btn.innerHTML = "Copy"; }, 2000);
                } catch (e) {
                    alert("Could not copy to clipboard. Please select manually.");
                }
            }
        }

        async function copyFormalPlainText() {
            const el = document.getElementById('formal-text');
            let text = el.innerText;
            const btn = document.getElementById('copy-formal-plain-btn');
            try {
                await navigator.clipboard.writeText(text);
                const originalText = btn.innerHTML;
                btn.innerHTML = "Copied!";
                btn.classList.replace('bg-gray-500', 'bg-green-600');
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.replace('bg-green-600', 'bg-gray-500');
                }, 2000);
            } catch (err) {
                alert("Could not copy to clipboard. Please select manually.");
            }
        }
        window.copyFormalPlainText = copyFormalPlainText;

        function escapeRTF(text) {
            if (!text) return "";
            return text.replace(/[\\{}]/g, "\\$&")
                .replace(/\n/g, "\\line ");
        }

        function generateRTF(type) {
            const selected = Array.from(document.querySelectorAll('input[name="allergen"]:checked'));
            if (selected.length === 0) return null;

            const names = selected.map(cb => cb.value);
            let content = "";

            if (type === 'sentence') {
                let sentence = "The patient is allergic to ";
                if (names.length === 1) {
                    sentence += names[0] + ".";
                } else if (names.length === 2) {
                    sentence += names[0] + " and " + names[1] + ".";
                } else {
                    const last = names.pop();
                    sentence += names.join(", ") + ", and " + last + ".";
                }
                content = escapeRTF(sentence);
            } else {
                const grouped = {};
                selected.forEach(cb => {
                    const cat = cb.getAttribute('data-category');
                    if (!grouped[cat]) grouped[cat] = [];
                    grouped[cat].push(cb.value);
                });

                content += "{\\i Note: Allergens listed in parentheses represent cross-reactive species that may cause symptoms despite not being individually tested.}\\line ";
                
                allergenData.forEach(cat => {
                    if (grouped[cat.category]) {
                        const itemStrings = grouped[cat.category].map(selectedName => {
                            const itemData = cat.items.find(i => i.name === selectedName);
                            let str = selectedName;
                            if (itemData && itemData.cross) {
                                str += ` (${itemData.cross})`;
                            }
                            return escapeRTF(str);
                        });
                        content += "{\\b " + escapeRTF(cat.category.toUpperCase()) + "}:\\line " + itemStrings.join("\\line ") + "\\line\\line ";
                    }
                });
            }

            return `{\\rtf1\\ansi\\deff0 {\\fonttbl {\\f0 Arial;}} \\f0\\fs24 ${content}}`;
        }

        function downloadRTF(type) {
            const rtf = generateRTF(type);
            if (!rtf) {
                alert("Please select at least one allergen.");
                return;
            }

            const blob = new Blob([rtf], { type: 'application/rtf' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `allergy_result_${type}.rtf`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        // PDF export logic
        window.exportPDFHandouts = async function() {
            // Always include Default.pdf first
            const pdfs = ["Default.pdf"];
            // Collect selected allergens
            const selected = Array.from(document.querySelectorAll('input[name="allergen"]:checked'));
            const uniquePDFs = new Set();
            selected.forEach(cb => {
                const catName = cb.getAttribute('data-category');
                const allergenName = cb.value;
                const cat = allergenData.find(c => c.category === catName);
                if (cat) {
                    const item = cat.items.find(i => i.name === allergenName);
                    let pdf = "Default.pdf";
                    // Use mapped PDF if specified, else use defaults
                    if (item && item.pdf) {
                        pdf = item.pdf;
                    } else {
                        // Default mapping logic
                        if (catName === "Molds") pdf = "Mold.pdf";
                        else if (["Tree Pollens", "Grass Pollens", "Weed Pollens"].includes(catName)) pdf = "Pollen.pdf";
                        else if (allergenName === "Cat") pdf = "Cat.pdf";
                        else if (allergenName === "Dog") pdf = "Dog.pdf";
                        else if (allergenName === "Mouse") pdf = "Mouse.pdf";
                        else if (allergenName === "Cockroach") pdf = "Cockroach.pdf";
                        else if (allergenName === "Dust Mite") pdf = "Dust Mite.pdf";
                    }
                    if (pdf !== "Default.pdf") uniquePDFs.add(pdf);
                }
            });
            pdfs.push(...Array.from(uniquePDFs));

            // Fetch all PDFs as ArrayBuffers
            const pdfBuffers = [];
            for (const pdfName of pdfs) {
                try {
                    const response = await fetch(`Avoidance/${pdfName}`);
                    const buffer = await response.arrayBuffer();
                    pdfBuffers.push(buffer);
                } catch (e) {
                    console.error(`Failed to fetch ${pdfName}`);
                }
            }
            if (pdfBuffers.length === 0) {
                alert("No PDFs found to export.");
                return;
            }

            // Merge PDFs using PDF-lib
            const { PDFDocument } = window['PDFLib'];
            const mergedPdf = await PDFDocument.create();
            for (const pdfBytes of pdfBuffers) {
                const pdf = await PDFDocument.load(pdfBytes);
                const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                copiedPages.forEach(page => mergedPdf.addPage(page));
            }
            const mergedBytes = await mergedPdf.save();

            // Download merged PDF
            const blob = new Blob([mergedBytes], { type: 'application/pdf' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "Patient_Allergen_Handouts.pdf";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };
        // Show/Hide Edit Allergen List Section
        function toggleEditorSection() {
            const section = document.getElementById('edit-allergen-section');
            const btn = document.getElementById('toggle-editor-btn');
            if (section.style.display === 'none') {
                section.style.display = '';
                btn.textContent = 'Hide Edit Allergen List';
            } else {
                section.style.display = 'none';
                btn.textContent = 'Show Edit Allergen List';
            }
        }
        window.toggleEditorSection = toggleEditorSection;
    </script>
</body>
</html>
